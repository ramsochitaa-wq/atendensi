<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendensi Wanachama - App</title>
    <meta name="description" content="App ya kusanya na kuhariri taarifa za wanachama">
    <meta name="theme-color" content="#4CAF50">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="https://via.placeholder.com/192?text=AT" type="image/png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        input { width: 100%; border: none; background: transparent; padding: 5px; }
        input:focus { outline: 2px solid #4CAF50; background: #fff; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .add { background: #2196F3; }
        .pdf { background: #FF9800; }
        .email { background: #9C27B0; }
        .clear { background: #f44336; }
        #status { color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Atendensi Wanachama</h1>
    <p>Hariri moja kwa moja kwenye table. Mabadiliko yanahifadhiwa mara moja. Bonyeza + kwenye Chrome ili ku-install kama app.</p>
    
    <table id="membersTable">
        <thead>
            <tr>
                <th>Jina Kamili</th>
                <th>Jina la Account</th>
                <th>Namba za Simu</th>
                <th>Aina ya Mtandao</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    
    <button class="add" onclick="addRow()">+ Ongeza Mwanachama</button>
    <button class="pdf" onclick="generatePDF()">Generate PDF</button>
    <button class="email" onclick="sendViaEmail()">Tuma kwa Email</button>
    <button class="clear" onclick="clearAllData()">Futa Data Zote</button>
    
    <p id="status"></p>

    <script>
        const tableBody = document.getElementById('tableBody');
        const storageKey = 'wanachamaData';
        const status = document.getElementById('status');

        function loadData() {
            const saved = localStorage.getItem(storageKey);
            if (saved) JSON.parse(saved).forEach(r => addRow(r.fullName, r.accountName, r.phone, r.network));
            else addRow();
        }

        function saveData() {
            const rows = [];
            tableBody.querySelectorAll('tr').forEach(tr => {
                const ins = tr.querySelectorAll('input');
                if (ins.length === 4) {
                    const d = {fullName: ins[0].value.trim(), accountName: ins[1].value.trim(), phone: ins[2].value.trim(), network: ins[3].value.trim()};
                    if (d.fullName) rows.push(d);
                }
            });
            localStorage.setItem(storageKey, JSON.stringify(rows));
            status.textContent = 'Imehifadhiwa!'; setTimeout(() => status.textContent='', 2000);
        }

        function addRow(fn='', an='', ph='', net='') {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><input value="\( {fn}" oninput="saveData()"></td><td><input value=" \){an}" oninput="saveData()"></td><td><input value="\( {ph}" oninput="saveData()"></td><td><input value=" \){net}" oninput="saveData()"></td><td><button onclick="this.closest('tr').remove(); saveData();">Futa</button></td>`;
            tableBody.appendChild(tr);
            saveData();
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf || {};
            if (!jsPDF) return alert('PDF library haikupakuliwa.');
            const doc = new jsPDF();
            doc.text('Taarifa za Wanachama', 20, 20);
            let y = 35;
            tableBody.querySelectorAll('tr').forEach((tr, i) => {
                const ins = tr.querySelectorAll('input');
                if (ins[0]?.value.trim()) {
                    doc.text(`Mwanachama ${i+1}: ${ins[0].value}`, 20, y); y += 10;
                    doc.text(`Account: ${ins[1].value}`, 30, y); y += 7;
                    doc.text(`Simu: ${ins[2].value}`, 30, y); y += 7;
                    doc.text(`Mtandao: ${ins[3].value}`, 30, y); y += 10;
                    if (y > 270) { doc.addPage(); y = 20; }
                }
            });
            doc.save('wanachama.pdf');
        }

        function sendViaEmail() {
            let body = 'Taarifa za Wanachama:\n\n';
            tableBody.querySelectorAll('tr').forEach((tr, i) => {
                const ins = tr.querySelectorAll('input');
                if (ins[0]?.value.trim()) body += `Mwanachama ${i+1}: ${ins[0].value}\nAccount: ${ins[1].value}\nSimu: ${ins[2].value}\nMtandao: ${ins[3].value}\n\n`;
            });
            if (body === 'Taarifa za Wanachama:\n\n') return alert('Hakuna data.');
            location.href = `mailto:ramsochitaa@gmail.com?subject=Atendensi&body=${encodeURIComponent(body)}`;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW error:', e));
        }

        loadData();
    </script>
</body>
</html>
